name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run test:coverage
      - name: Update Coverage Badge
        if: github.ref == 'refs/heads/main'
        run: node scripts/update-badge.mjs
      - name: Create Pull Request for Badge
        id: cpr
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.AUTO_APPROVE_PAT }}
          commit-message: "docs: update coverage badge"
          title: "docs: update coverage badge"
          body: "Automated update of coverage badge in README.md from CI."
          branch: "docs/update-coverage-badge"
          base: "main"
          delete-branch: true
      - name: Merge PR with Admin Override
        if: steps.cpr.outputs.pull-request-number
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --admin
        env:
          GH_TOKEN: ${{ secrets.AUTO_APPROVE_PAT }}
      - run: npm run test:e2e
      - run: npm run build
